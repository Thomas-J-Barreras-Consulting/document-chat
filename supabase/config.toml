# Supabase local development config.
# If your installed Supabase CLI version rejects any key below, run
# `supabase init` to regenerate a version-matched file, then re-add the
# `[storage] file_size_limit` and `[auth] site_url` overrides.

project_id = "document-chat"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Local email testing inbox.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# Matches the 50 MB upload ceiling in REQ-1.1.1.
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Off locally so signups don't require clicking a confirmation email.
enable_confirmations = false

[analytics]
enabled = false
