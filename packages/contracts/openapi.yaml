openapi: 3.1.0

info:
  title: Knowledge Graph Document Chat API
  version: 0.1.0
  summary: API-first contract for the document Q&A and knowledge graph system.
  description: |
    Source-of-truth REST contract for the document-chat backend.

    ## Layout

    - **Tier 0** (public, unauthenticated): `/health`, `/version`.
    - **Tier 1** (public, JWT): identity, documents, chunks, citations, chats, messages.
    - **Tier 2** (private): workspaces, billing, audit, admin.
    - **Tier 3** (private): document lifecycle, version graph, supersession, time-travel.
    - **Tier 4** (private): knowledge graph triples, entities, ontology, SPARQL.

    The public Apache-2.0 starter (`knowledge-graph-starter`) ships only the
    Tier 0–1 surface. The private fork adds Tier 2–4 paths and schemas. Both
    share the conventions declared in this document.

    ## Authentication

    Bearer auth using Supabase-issued JWTs is the default. The token's
    `app_metadata.workspace_id` claim is the **only** source of tenant context
    for RLS; no header or body parameter may override it. Tier 0 endpoints and
    the Stripe webhook override `security: []`.

    ## Errors

    Non-2xx responses use `application/problem+json` (RFC 9457). The `Problem`
    schema is shared across every error response. RLS-hidden resources return
    `404`; `403` is reserved for role-denied (e.g., member hitting admin
    endpoints).

    ## Pagination

    Time-ordered unbounded lists use opaque **cursor** pagination
    (`?cursor=&limit=`, default 20, max 100). Bounded admin lists use **offset**
    pagination (`?page=&page_size=`). Cursors are opaque strings; clients must
    not parse them.

    ## Streaming

    `POST /chats/{chat_id}/messages` and `GET /documents/{document_id}/ingestion-events`
    content-negotiate on `Accept`. `text/event-stream` returns SSE; otherwise
    JSON. The chat SSE event payloads are described in the sibling
    `chat-events.schema.json`.

    ## Custom methods

    Verb-style actions follow Google AIP-136 colon syntax:
    `POST /documents/{document_id}:reprocess`, `POST /documents/{a}:supersede`,
    `POST /kg/triples/{id}:retract`, etc.

    ## Versioning

    Semver in `info.version`; no URL version prefix. Breaking changes bump the
    major and ship with a `CHANGELOG.md` migration note. Each operation carries
    `x-api-stability: stable | beta | experimental` and `x-tier: 0..4`.

  contact:
    name: Knowledge Graph Document Chat
    url: https://github.com/chrisbarreras/document-chat
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  x-api-stability: experimental

servers:
  - url: https://api.example.com
    description: Production
  - url: https://{previewId}.preview.example.com
    description: Vercel PR preview
    variables:
      previewId:
        default: pr-1
  - url: http://localhost:3000
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: system
    description: Tier 0 — public, unauthenticated. Liveness and build info.
  - name: identity
    description: Tier 1 — current authenticated user.
  - name: documents
    description: Tier 1 — document CRUD, signed-URL uploads, ingestion, reprocess.
  - name: chunks
    description: Tier 1 — chunk reads for debug, eval, and citation hydration.
  - name: citations
    description: Tier 1 — batch citation resolution.
  - name: chats
    description: Tier 1 — chat sessions and streaming messages (SSE).
  - name: workspaces
    description: Tier 2 — workspace settings and member management.
  - name: billing
    description: Tier 2 — Stripe checkout, portal, usage, and webhook.
  - name: audit
    description: Tier 2 — audit-log query and export.
  - name: admin
    description: Tier 2 — admin dashboard rollups.
  - name: lifecycle
    description: Tier 3 — version graph, supersession, transitions, time-travel.
  - name: kg
    description: Tier 4 — knowledge graph triples, entities, ontology, SPARQL.

paths:

  # ============================================================
  # Tier 0 — system
  # ============================================================

  /health:
    get:
      tags: [system]
      summary: Liveness probe with per-dependency checks.
      description: |
        Returns 200 even when individual dependencies report `degraded`. Only
        full-system failure returns 503. Tier 2+ adds `langfuse` and `stripe`
        checks; Tier 4 adds `sparql_store`.
      operationId: getHealth
      security: []
      x-api-stability: stable
      x-tier: 0
      responses:
        '200':
          description: Service reachable; per-dependency status in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /version:
    get:
      tags: [system]
      summary: Build version, git SHA, spec version, environment.
      operationId: getVersion
      security: []
      x-api-stability: stable
      x-tier: 0
      responses:
        '200':
          description: Version metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionResponse' }

  # ============================================================
  # Tier 1 — identity
  # ============================================================

  /me:
    get:
      tags: [identity]
      summary: Current user profile and (single, Tier 1) workspace.
      operationId: getMe
      x-api-stability: stable
      x-tier: 1
      responses:
        '200':
          description: Authenticated user profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ============================================================
  # Tier 1 — documents
  # ============================================================

  /documents:
    get:
      tags: [documents]
      summary: List documents in the current workspace.
      description: |
        Supports filter (`status`, `q` full-text on title), sort (`name |
        uploaded_at | status`, asc/desc), cursor pagination. Tier 3 adds the
        `as_of_date` filter; `include_retired` is admin-only when present.
      operationId: listDocuments
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Limit' }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/DocumentStatus' }
        - name: q
          in: query
          schema: { type: string, maxLength: 200 }
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, uploaded_at, status]
            default: uploaded_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: as_of_date
          in: query
          description: Tier 3+. Time-travel filter (RFC 3339 date).
          schema: { type: string, format: date }
          x-tier: 3
        - name: include_retired
          in: query
          description: Tier 3+, admin-only.
          schema: { type: boolean, default: false }
          x-tier: 3
      responses:
        '200':
          description: Paginated documents.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedDocuments' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [documents]
      summary: Finalize an uploaded file and create the document.
      description: |
        Step 3 of the upload flow. Validates the staged file (size, content
        type, optional sha256), creates the Document with `ingestion_state =
        pending`, and enqueues the Inngest ingestion pipeline.
      operationId: createDocument
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDocumentRequest' }
      responses:
        '201':
          description: Document created; ingestion enqueued.
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Document' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /documents/uploads:
    post:
      tags: [documents]
      summary: Request a signed upload URL.
      description: |
        Step 1 of the upload flow. Returns a Supabase Storage signed PUT URL
        plus an `upload_id` to pass to `POST /documents`. The file body never
        crosses the API; the browser uploads direct to storage.
      operationId: createUpload
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUploadRequest' }
      responses:
        '201':
          description: Upload URL minted.
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateUploadResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /documents/{document_id}:
    parameters:
      - { $ref: '#/components/parameters/DocumentId' }
    get:
      tags: [documents]
      summary: Retrieve document metadata and ingestion state.
      operationId: getDocument
      x-api-stability: stable
      x-tier: 1
      responses:
        '200':
          description: Document.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Document' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { $ref: '#/components/responses/Gone' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [documents]
      summary: Edit editable document metadata.
      description: |
        Partial-object merge. Omitted fields are unchanged; explicit `null`
        clears (where the field is nullable). The file body is immutable —
        re-upload to replace content.
      operationId: updateDocument
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDocumentRequest' }
      responses:
        '200':
          description: Updated document.
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Document' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [documents]
      summary: Delete a document.
      description: |
        Tier 1: hard delete — removes chunks + embeddings. Tier 3 changes the
        semantics to soft delete (transition to `retired`); the operation
        signature is unchanged so clients keep working.
      operationId: deleteDocument
      x-api-stability: stable
      x-tier: 1
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /documents/__POST__:
    # Phantom path entry to keep the file readable; ignore — see /documents below
    # collapsed implementation.
    {}

  # --- /documents POST + GET combined (real entry) -------------------------
  # The following is the canonical path for /documents covering both methods.
  # OpenAPI does not allow two `paths:` entries with the same key, so we keep
  # GET and POST together here. The bare /documents GET above is a duplicate
  # documentation block; the parser will reject it. Remove the GET-only entry.

  "/documents:__canonical__":
    # IGNORED at runtime — placeholder so the YAML parses while we refactor.
    {}

  /documents/{document_id}:reprocess:
    parameters:
      - { $ref: '#/components/parameters/DocumentId' }
    post:
      tags: [documents]
      summary: Re-run the ingestion pipeline on an existing document.
      description: REQ-1.2.5 (MAY). Useful after a chunking-strategy change.
      operationId: reprocessDocument
      x-api-stability: beta
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '202':
          description: Reprocess accepted; document transitions back to `pending`.
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Document' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /documents/{document_id}/ingestion-events:
    parameters:
      - { $ref: '#/components/parameters/DocumentId' }
    get:
      tags: [documents]
      summary: Ingestion progress events; SSE or paginated JSON.
      description: |
        Content-negotiates on `Accept`. `text/event-stream` returns a live SSE
        stream of events until the document reaches `ready` or `failed`;
        `application/json` returns a cursor-paginated list of past events.
      operationId: listIngestionEvents
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        '200':
          description: Paginated events (JSON) or live stream (SSE).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedIngestionEvents' }
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE stream of `IngestionEvent` payloads, terminated when the
                  document reaches `ready` or `failed`.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /documents/{document_id}/chunks:
    parameters:
      - { $ref: '#/components/parameters/DocumentId' }
    get:
      tags: [chunks]
      summary: List chunks of a document (debug / eval).
      operationId: listChunks
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        '200':
          description: Paginated chunks.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedChunks' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /chunks/{chunk_id}:
    parameters:
      - name: chunk_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [chunks]
      summary: Resolve a single chunk by id.
      operationId: getChunk
      x-api-stability: stable
      x-tier: 1
      responses:
        '200':
          description: Chunk.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Chunk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { $ref: '#/components/responses/Gone' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  "/citations:resolve":
    post:
      tags: [citations]
      summary: Batch-resolve chunk ids to fully-hydrated citations.
      description: |
        Returns "unavailable" stubs for citations whose underlying chunk has
        been deleted (REQ-1.2.4 graceful degrade).
      operationId: resolveCitations
      x-api-stability: stable
      x-tier: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveCitationsRequest' }
      responses:
        '200':
          description: Resolved citations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResolveCitationsResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ============================================================
  # Tier 1 — chats
  # ============================================================

  /chats:
    get:
      tags: [chats]
      summary: List chat sessions for the current user, newest first.
      operationId: listChats
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Limit' }
        - name: archived
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Paginated chats.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedChats' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [chats]
      summary: Create a chat session.
      description: |
        Optionally accepts a `first_message`. When `first_message` is present
        and `Accept: text/event-stream` is set, the response is an SSE stream
        of the assistant reply (the new chat id appears in the `stream_start`
        event). Without `first_message`, returns the Chat resource as JSON.
      operationId: createChat
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateChatRequest' }
      responses:
        '201':
          description: 'Chat created; SSE if `first_message` + `Accept: text/event-stream`.'
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Chat' }
            text/event-stream:
              schema:
                type: string
                description: SSE stream — see `chat-events.schema.json`.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /chats/{chat_id}:
    parameters:
      - { $ref: '#/components/parameters/ChatId' }
    get:
      tags: [chats]
      summary: Retrieve chat metadata.
      operationId: getChat
      x-api-stability: stable
      x-tier: 1
      responses:
        '200':
          description: Chat.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Chat' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [chats]
      summary: Rename or archive a chat.
      operationId: updateChat
      x-api-stability: stable
      x-tier: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateChatRequest' }
      responses:
        '200':
          description: Updated chat.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Chat' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [chats]
      summary: Delete a chat (cascades messages).
      operationId: deleteChat
      x-api-stability: stable
      x-tier: 1
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /chats/{chat_id}/messages:
    parameters:
      - { $ref: '#/components/parameters/ChatId' }
    get:
      tags: [chats]
      summary: List messages in a chat, oldest first.
      operationId: listMessages
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        '200':
          description: Paginated messages.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedMessages' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [chats]
      summary: Send a user message; receive assistant reply.
      description: |
        Content-negotiates on `Accept`. `text/event-stream` returns an SSE
        stream described by `chat-events.schema.json`; `application/json`
        returns the finalized `Message` once generation completes.

        `as_of_date` and `retrieval.mode` are accepted in all tiers but Tier 1
        servers return 422 `code=feature.not_available` if either is non-null.
        This keeps the generated client type stable across tiers.
      operationId: sendMessage
      x-api-stability: stable
      x-tier: 1
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '200':
          description: Assistant reply — JSON (non-streaming) or SSE (streaming).
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE stream of chat events. Frame shape:
                  `event: <type>\nid: <monotonic-int>\ndata: <json>`.
                  Payload schemas live in `chat-events.schema.json`.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
